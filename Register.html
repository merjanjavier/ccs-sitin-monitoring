<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="Register.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <title>CCS Sit-in Monitoring System</title>
  </head>
  <body>
    <div class="nav">
      <div class="logo">
        <img
          src="./images/uclogono.png"
          class="img"
          alt="uclogo"
        />
        <p class="title">CCS Sit-in Monitoring System</p>
      </div>

      <div class="links">
        <a href="index.html">Home</a>
        <a href="#community">Community</a>
        <a href="#about">About</a>
        <a href="Login.html">Login</a>
        <a href="Register.html">Register</a>
      </div>
      
      <button class="mobile-menu-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <main>
      <section class="Register animate__animated animate__fadeInUp">
        <div class="container-left">
          <h1>Create Your Account</h1>
          <form action="">
            <div class="input-text">
              <input type="text" id="number" />
              <label for="idnumber">ID Number</label>
            </div>

            <div class="input-text">
              <input type="text" id="lastname" />
              <label for="lastname">Last Name</label>
            </div>

            <div class="input-text">
              <input type="text" id="firstname" />
              <label for="firstname">First Name</label>
            </div>

            <div class="input-text">
              <input type="middlename" id="middlename" />
              <label for="middlename">Middle Name</label>
            </div>

            <div class="input-text">
              <select id="courselevel" required>
                <option value="" disabled selected>Select Course Level</option>
                <option value="1st Year">1st Year</option>
                <option value="2nd Year">2nd Year</option>
                <option value="3rd Year">3rd Year</option>
                <option value="4th Year">4th Year</option>
              </select>
            </div>
          </form>
        </div>

        <div class="container-right">
          <form action="" style="margin-top: 55px">
            <div class="input-text">
              <select id="course" required>
                <option value="" disabled selected>Select Course</option>
                <option value="BSCS">Bachelor of Science in Computer Science (BSCS)</option>
                <option value="BSIT">Bachelor of Science in Information Technology (BSIT)</option>
                <option value="BSAI">Bachelor of Science in Artificial Intelligence (BSAI)</option>
                <option value="BSIS">Bachelor of Science in Information Systems (BSIS)</option>
                <option value="BSDS">Bachelor of Science in Data Science (BSDS)</option>
                <option value="BSCpE">Bachelor of Science in Computer Engineering (BSCpE)</option>
                <option value="ACT">Associate in Computer Technology (ACT)</option>
                <option value="DIT">Diploma in Information Technology (DIT)</option>
              </select>
            </div>

            <div class="input-text">
              <input type="text" id="address" />
              <label for="address">Address</label>
            </div>

            <div class="input-text">
              <input type="text" id="email" />
              <label for="email">Email</label>
            </div>

            <div class="input-text">
              <input type="password" id="password" />
              <label for="password">Password</label>
            </div>

            <div class="input-text">
              <input type="password" id="confirmPassword" />
              <label for="confirmPassword">Repeat Password</label>
            </div>

            <div class="btn">
              <button type="button">Register</button>
            </div>
            
            <div class="login-link">
              <p>Already have an account? <a href="Login.html">Login here</a></p>
            </div>
          </form>
        </div>
      </section>
    </main>
    <script src="register.js"></script>
  </body>
</html>
